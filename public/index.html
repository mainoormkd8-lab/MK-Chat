<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MK Chat</title>

  <link rel="stylesheet" href="style.css">
  <script src="/socket.io/socket.io.js"></script>
</head>

<body>
<div id="loginPage">

  <h2 id="chatTitle">MK Chat</h2>

  <input
    id="username"
    type="text"
    placeholder="Enter your name">

  <button id="loginBtn">
    Continue
  </button>
<div class="avatar-preview">
  👤
</div>
</div>
<div class="app" id="chatPage" style="display:none;">

<header class="header">
  <div class="avatar">MK</div>

  <div class="user">
    <h2>MK Chat</h2>
    <span id="onlineUsers">🟢 1 User Online</span>
  </div>
</header>
<div id="userList" class="user-list">
  <h3>🟢 Online Users</h3>
  <ul id="users"></ul>
</div>
<div id="typing" class="typing"></div>
<main id="chatBox"></main>
<footer class="footer">

<button id="emojiBtn">😊</button>
<input
  type="file"
  id="imageInput"
  accept="image/*"
  style="display:none;">

<button id="imageBtn">📎</button>

<input
id="message"
type="text"
placeholder="Type a message...">

<button id="sendBtn">➤</button>

</footer>

</div>

<script src="script.js"></script>

</body>
</html>
